name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test
      - name: Smoke init + doctor
        run: |
          tmp="$(mktemp -d)"
          node bin/hero-vibe-kit.js init --dir "$tmp" --yes --skip-integrations --name CI --lang en
          node bin/hero-vibe-kit.js doctor --dir "$tmp"
